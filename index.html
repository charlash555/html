<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hello Keerthii 💛</title>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@700&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a1a;
    min-height: 100vh;
    overflow-x: hidden;
    font-family: 'Orbitron', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  /* STARFIELD */
  .stars {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    z-index: 0; pointer-events: none;
  }
  .star {
    position: absolute;
    background: #fff;
    border-radius: 50%;
    animation: twinkle var(--d) ease-in-out infinite alternate;
  }
  @keyframes twinkle {
    0% { opacity: 0.1; transform: scale(0.8); }
    100% { opacity: 1; transform: scale(1.3); }
  }

  /* GRADIENT SKY */
  .sky {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: radial-gradient(ellipse at 50% 0%, #1a0533 0%, #0a0a2e 40%, #0a0a1a 100%);
    z-index: 0;
  }

  /* AURORA */
  .aurora {
    position: fixed; top: 0; left: 0; width: 100%; height: 60%;
    z-index: 0; pointer-events: none;
    background: linear-gradient(180deg,
      rgba(100,200,255,0.04) 0%,
      rgba(180,100,255,0.06) 30%,
      transparent 100%);
    animation: auroraShift 8s ease-in-out infinite alternate;
  }
  @keyframes auroraShift {
    0% { opacity: 0.4; transform: translateX(-20px); }
    100% { opacity: 1; transform: translateX(20px); }
  }

  /* MOON */
  .moon {
    position: fixed; top: 60px; right: 120px;
    width: 90px; height: 90px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #fffde7, #f5c842, #e6a800);
    box-shadow: 0 0 40px #f5c84280, 0 0 80px #f5c84240;
    z-index: 1;
    animation: moonPulse 4s ease-in-out infinite alternate;
  }
  @keyframes moonPulse {
    0% { box-shadow: 0 0 40px #f5c84280, 0 0 80px #f5c84240; }
    100% { box-shadow: 0 0 60px #f5c842aa, 0 0 120px #f5c84260; }
  }

  /* GROUND */
  .ground {
    position: fixed; bottom: 0; left: 0; width: 100%; height: 160px;
    background: linear-gradient(180deg, #1a1205 0%, #2a1e08 50%, #3d2d10 100%);
    z-index: 1;
  }
  .ground-detail {
    position: absolute; top: 0; left: 0; width: 100%; height: 30px;
    background: repeating-linear-gradient(90deg,
      #2a1e08 0px, #2a1e08 40px,
      #1a1205 40px, #1a1205 80px);
    opacity: 0.5;
  }

  /* JUNK PILES */
  .junk {
    position: fixed; bottom: 155px; z-index: 1;
    display: flex; gap: 4px; align-items: flex-end;
  }
  .junk-block {
    background: linear-gradient(180deg, #5a5a3a, #3a3a20);
    border-radius: 2px;
    border: 1px solid #6a6a4a;
  }

  /* SCENE CONTAINER */
  .scene {
    position: relative; z-index: 10;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    min-height: 100vh; width: 100%;
    padding: 40px 20px 180px;
  }

  /* MESSAGE */
  .message-wrap {
    text-align: center; margin-bottom: 60px; position: relative;
  }
  .greeting {
    font-family: 'Caveat', cursive;
    font-size: clamp(2.2rem, 6vw, 4.5rem);
    color: #ffe066;
    text-shadow: 0 0 30px #f5c84280, 0 2px 4px #000;
    animation: floatText 3s ease-in-out infinite alternate;
    line-height: 1.2;
    letter-spacing: 2px;
  }
  .sub-msg {
    font-family: 'Caveat', cursive;
    font-size: clamp(1.2rem, 3vw, 2rem);
    color: #a0d8ff;
    margin-top: 12px;
    text-shadow: 0 0 20px #64c8ff60;
    animation: floatText 3s ease-in-out infinite alternate-reverse;
  }
  @keyframes floatText {
    0% { transform: translateY(0px); }
    100% { transform: translateY(-10px); }
  }

  /* HEARTS FLOATING */
  .heart-container {
    position: fixed; bottom: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none; z-index: 2;
  }
  .heart {
    position: absolute; bottom: 160px;
    font-size: 20px;
    animation: riseHeart var(--d) ease-in infinite;
    opacity: 0;
  }
  @keyframes riseHeart {
    0% { opacity: 0; transform: translateY(0) scale(0.5); }
    20% { opacity: 1; }
    80% { opacity: 0.7; }
    100% { opacity: 0; transform: translateY(-500px) scale(1.2) rotate(20deg); }
  }

  /* CHARACTERS STAGE */
  .characters {
    display: flex; align-items: flex-end; gap: 60px;
    margin-bottom: 20px; position: relative;
  }

  /* ============ WALL-E ============ */
  .walle-wrap {
    display: flex; flex-direction: column; align-items: center;
    animation: walleHop 1.2s ease-in-out infinite alternate;
    position: relative;
  }
  @keyframes walleHop {
    0% { transform: translateY(0) rotate(-2deg); }
    100% { transform: translateY(-12px) rotate(2deg); }
  }

  .walle-label {
    font-size: 10px; color: #f5c842; letter-spacing: 2px; margin-bottom: 6px;
    text-shadow: 0 0 10px #f5c84260;
  }

  /* WALL-E Body */
  .walle {
    width: 90px; height: 80px;
    background: linear-gradient(160deg, #b8860b, #8b6914, #5a4010);
    border-radius: 10px;
    border: 3px solid #f5c842;
    position: relative;
    box-shadow: 0 0 20px #f5c84240, inset 0 2px 4px rgba(255,255,200,0.2);
  }
  /* WALL-E chest panel */
  .walle-panel {
    position: absolute; top: 15px; left: 12px;
    width: 66px; height: 40px;
    background: #1a1a1a;
    border-radius: 6px;
    border: 2px solid #f5c842;
    overflow: hidden;
  }
  .walle-panel-light {
    position: absolute;
    border-radius: 50%;
    animation: blink 2s ease-in-out infinite;
  }
  @keyframes blink {
    0%,90%,100% { opacity: 1; }
    95% { opacity: 0; }
  }
  .wl1 { width: 10px; height: 10px; background: #00ff88; top: 8px; left: 8px; }
  .wl2 { width: 8px; height: 8px; background: #ff4444; top: 8px; left: 24px; }
  .wl3 { width: 8px; height: 8px; background: #ffff00; top: 8px; left: 38px; animation-delay: 0.5s; }
  .wl4 { width: 14px; height: 6px; background: #4444ff; top: 22px; left: 8px; border-radius: 3px; }

  /* WALL-E Head */
  .walle-head {
    position: absolute; top: -52px; left: 50%;
    transform: translateX(-50%);
    width: 70px; height: 48px;
    background: linear-gradient(160deg, #c8941b, #9a6e10, #5a4010);
    border-radius: 8px;
    border: 2.5px solid #f5c842;
    display: flex; align-items: center; justify-content: center; gap: 6px;
  }
  .walle-neck {
    position: absolute; top: -20px; left: 50%;
    transform: translateX(-50%);
    width: 18px; height: 22px;
    background: linear-gradient(180deg, #7a5010, #5a3a08);
    border: 2px solid #f5c842;
  }
  .walle-eye {
    width: 20px; height: 20px;
    background: radial-gradient(circle at 40% 35%, #00e5ff, #0077aa, #003355);
    border-radius: 50%;
    border: 2px solid #f5c842;
    position: relative;
    animation: eyeLook 4s ease-in-out infinite;
  }
  @keyframes eyeLook {
    0%,100% { transform: translateX(0); }
    30% { transform: translateX(2px); }
    60% { transform: translateX(-2px); }
  }
  .walle-pupil {
    position: absolute; top: 5px; left: 5px;
    width: 8px; height: 8px;
    background: #001122;
    border-radius: 50%;
  }
  /* WALL-E tracks */
  .walle-tracks {
    position: absolute; bottom: -18px; left: -8px;
    width: 106px; height: 22px;
    background: linear-gradient(180deg, #4a4a2a, #2a2a10);
    border-radius: 11px;
    border: 2px solid #888840;
    display: flex; align-items: center; justify-content: space-around;
    padding: 0 8px;
  }
  .track-wheel {
    width: 14px; height: 14px;
    background: radial-gradient(circle, #888, #333);
    border-radius: 50%;
    border: 1.5px solid #aaa;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

  /* ============ HEART IN MIDDLE ============ */
  .center-heart {
    font-size: 2.5rem;
    animation: heartBeat 0.8s ease-in-out infinite;
    filter: drop-shadow(0 0 12px #ff4488);
    margin-bottom: 20px;
  }
  @keyframes heartBeat {
    0%,100% { transform: scale(1); }
    50% { transform: scale(1.3); }
  }

  /* ============ EVE ============ */
  .eve-wrap {
    display: flex; flex-direction: column; align-items: center;
    animation: eveLevitate 2s ease-in-out infinite alternate;
    position: relative;
  }
  @keyframes eveLevitate {
    0% { transform: translateY(0) rotate(3deg); }
    100% { transform: translateY(-18px) rotate(-3deg); }
  }
  .eve-label {
    font-size: 10px; color: #a0d8ff; letter-spacing: 2px; margin-bottom: 6px;
    text-shadow: 0 0 10px #64c8ff60;
  }
  /* EVE body — smooth white egg */
  .eve {
    width: 70px; height: 95px;
    background: linear-gradient(145deg, #ffffff, #e8f4ff, #c0d8f0);
    border-radius: 50% 50% 45% 45% / 55% 55% 45% 45%;
    position: relative;
    box-shadow: 0 0 30px #64c8ff80, 0 0 60px #64c8ff40,
                inset -8px -8px 20px rgba(100,180,255,0.3),
                inset 4px 4px 10px rgba(255,255,255,0.8);
    border: 1px solid rgba(200,230,255,0.6);
  }
  /* EVE eyes */
  .eve-eyes {
    position: absolute; top: 30px; left: 50%;
    transform: translateX(-50%);
    display: flex; gap: 12px;
  }
  .eve-eye {
    width: 16px; height: 16px;
    background: #00aaff;
    border-radius: 50%;
    box-shadow: 0 0 8px #00aaff;
    animation: eveWink 5s ease-in-out infinite;
  }
  .eve-eye:last-child { animation-delay: 0.1s; }
  @keyframes eveWink {
    0%,88%,96%,100% { transform: scaleY(1); }
    92% { transform: scaleY(0.1); }
  }
  /* EVE scan line */
  .eve-scan {
    position: absolute; top: 50px; left: 8px; right: 8px; height: 2px;
    background: linear-gradient(90deg, transparent, #00e5ff, transparent);
    animation: scanMove 2s linear infinite;
  }
  @keyframes scanMove {
    0% { top: 20px; opacity: 1; }
    80% { opacity: 1; }
    100% { top: 80px; opacity: 0; }
  }
  /* EVE glow aura */
  .eve-aura {
    position: absolute; top: -15px; left: -15px; right: -15px; bottom: -15px;
    border-radius: 50% 50% 45% 45% / 55% 55% 45% 45%;
    background: radial-gradient(ellipse, rgba(100,200,255,0.15), transparent);
    animation: auraGlow 2s ease-in-out infinite alternate;
    pointer-events: none;
  }
  @keyframes auraGlow {
    0% { opacity: 0.5; transform: scale(1); }
    100% { opacity: 1; transform: scale(1.1); }
  }

  /* SPARKLES */
  .sparkle {
    position: absolute;
    pointer-events: none;
    animation: sparkleAnim var(--d) ease-in-out infinite;
    opacity: 0;
  }
  @keyframes sparkleAnim {
    0%,100% { opacity: 0; transform: scale(0) rotate(0deg); }
    50% { opacity: 1; transform: scale(1) rotate(180deg); }
  }
  .sparkle::before {
    content: '✦';
    font-size: var(--s);
    color: var(--c);
    text-shadow: 0 0 6px var(--c);
  }

  /* BOTTOM TAGLINE */
  .tagline {
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(0.6rem, 1.5vw, 0.85rem);
    color: #64c8ff;
    letter-spacing: 4px;
    text-transform: uppercase;
    opacity: 0.7;
    margin-top: 20px;
    text-shadow: 0 0 10px #64c8ff40;
  }

  /* SHOOTING STAR */
  .shooting-star {
    position: fixed;
    width: 2px;
    height: 2px;
    background: #fff;
    border-radius: 50%;
    animation: shoot var(--d) linear infinite;
    opacity: 0;
    z-index: 0;
  }
  @keyframes shoot {
    0% { opacity: 0; transform: translateX(0) translateY(0); }
    5% { opacity: 1; }
    90% { opacity: 0.8; }
    100% { opacity: 0; transform: translateX(-600px) translateY(300px); }
  }
  .shooting-star::after {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 120px; height: 1px;
    background: linear-gradient(90deg, rgba(255,255,255,0.8), transparent);
    transform: rotate(calc(30deg * -1));
    transform-origin: left center;
  }
</style>
</head>
<body>

<div class="sky"></div>
<div class="aurora"></div>
<div class="moon"></div>

<!-- Stars -->
<div class="stars" id="stars"></div>

<!-- Shooting stars -->
<div id="shootingStars"></div>

<!-- Ground -->
<div class="ground">
  <div class="ground-detail"></div>
</div>

<!-- Junk piles decoration -->
<div class="junk" style="left:5%">
  <div class="junk-block" style="width:22px;height:18px"></div>
  <div class="junk-block" style="width:16px;height:28px"></div>
  <div class="junk-block" style="width:30px;height:14px"></div>
  <div class="junk-block" style="width:12px;height:22px"></div>
</div>
<div class="junk" style="right:8%">
  <div class="junk-block" style="width:18px;height:24px"></div>
  <div class="junk-block" style="width:28px;height:16px"></div>
  <div class="junk-block" style="width:14px;height:30px"></div>
</div>
<div class="junk" style="left:18%">
  <div class="junk-block" style="width:12px;height:20px"></div>
  <div class="junk-block" style="width:20px;height:12px"></div>
</div>
<div class="junk" style="right:22%">
  <div class="junk-block" style="width:16px;height:18px"></div>
  <div class="junk-block" style="width:22px;height:26px"></div>
  <div class="junk-block" style="width:10px;height:14px"></div>
</div>

<!-- Hearts floating -->
<div class="heart-container" id="hearts"></div>

<!-- Main scene -->
<div class="scene">
  <div class="message-wrap">
    <div class="greeting">Hello Keerthii 💛</div>
    <div class="sub-msg">I love you in every universe</div>
  </div>

  <div class="characters">

    <!-- WALL-E -->
    <div class="walle-wrap">
      <div class="walle-label">W A L L · E</div>
      <!-- Sparkles around WALL-E -->
      <div class="sparkle" style="--d:2.1s;--s:14px;--c:#f5c842;top:-10px;left:-15px;animation-delay:0s;"></div>
      <div class="sparkle" style="--d:2.8s;--s:10px;--c:#ffaa00;top:20px;left:-25px;animation-delay:1s;"></div>
      <div class="sparkle" style="--d:1.9s;--s:12px;--c:#f5c842;top:-5px;right:-10px;animation-delay:0.5s;"></div>

      <div class="walle" style="position:relative;">
        <!-- Neck -->
        <div class="walle-neck"></div>
        <!-- Head -->
        <div class="walle-head">
          <div class="walle-eye"><div class="walle-pupil"></div></div>
          <div class="walle-eye"><div class="walle-pupil"></div></div>
        </div>
        <!-- Chest panel -->
        <div class="walle-panel">
          <div class="walle-panel-light wl1"></div>
          <div class="walle-panel-light wl2"></div>
          <div class="walle-panel-light wl3"></div>
          <div class="walle-panel-light wl4"></div>
        </div>
        <!-- Tracks -->
        <div class="walle-tracks">
          <div class="track-wheel"></div>
          <div class="track-wheel" style="animation-delay:0.2s"></div>
          <div class="track-wheel" style="animation-delay:0.4s"></div>
          <div class="track-wheel" style="animation-delay:0.1s"></div>
        </div>
      </div>
    </div>

    <!-- CENTER HEART -->
    <div class="center-heart">♥</div>

    <!-- EVE -->
    <div class="eve-wrap">
      <div class="eve-label">E V E</div>
      <!-- Sparkles around EVE -->
      <div class="sparkle" style="--d:2.4s;--s:14px;--c:#64c8ff;top:-20px;left:-10px;animation-delay:0.3s;"></div>
      <div class="sparkle" style="--d:2.0s;--s:10px;--c:#a0e0ff;top:10px;right:-20px;animation-delay:0.8s;"></div>
      <div class="sparkle" style="--d:3.0s;--s:12px;--c:#00e5ff;top:50px;left:-25px;animation-delay:1.2s;"></div>

      <div class="eve">
        <div class="eve-aura"></div>
        <div class="eve-eyes">
          <div class="eve-eye"></div>
          <div class="eve-eye"></div>
        </div>
        <div class="eve-scan"></div>
      </div>
    </div>

  </div>

  <div class="tagline">Directive: Love · Always · Forever</div>
</div>

<script>
  // Generate stars
  const starsEl = document.getElementById('stars');
  for (let i = 0; i < 180; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const size = Math.random() * 2.5 + 0.5;
    s.style.cssText = `
      width:${size}px; height:${size}px;
      top:${Math.random()*85}%;
      left:${Math.random()*100}%;
      --d:${(Math.random()*3+1.5).toFixed(1)}s;
      animation-delay:${(Math.random()*3).toFixed(1)}s;
    `;
    starsEl.appendChild(s);
  }

  // Shooting stars
  const shootEl = document.getElementById('shootingStars');
  for (let i = 0; i < 4; i++) {
    const ss = document.createElement('div');
    ss.className = 'shooting-star';
    ss.style.cssText = `
      top:${Math.random()*40}%;
      right:${Math.random()*60}%;
      --d:${(Math.random()*6+5).toFixed(1)}s;
      animation-delay:${(Math.random()*8).toFixed(1)}s;
    `;
    shootEl.appendChild(ss);
  }

  // Floating hearts
  const heartEl = document.getElementById('hearts');
  const heartChars = ['♥','♡','💛','💙','✨'];
  for (let i = 0; i < 18; i++) {
    const h = document.createElement('div');
    h.className = 'heart';
    h.textContent = heartChars[Math.floor(Math.random()*heartChars.length)];
    h.style.cssText = `
      left:${Math.random()*95}%;
      --d:${(Math.random()*4+4).toFixed(1)}s;
      animation-delay:${(Math.random()*8).toFixed(1)}s;
      font-size:${Math.random()*16+12}px;
    `;
    heartEl.appendChild(h);
  }
</script>
</body>
</html>
